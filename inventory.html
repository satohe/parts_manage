<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>部品在庫管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--warn:#d97706;--border:#e2e8f0;--surface:#f8fafc;--text:#1e293b;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:var(--text);min-height:100vh}
/* NAV */
.top-nav{background:#fff;border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 1rem;gap:0.5rem;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.brand{font-weight:700;font-size:1rem;color:var(--primary);white-space:nowrap;display:flex;align-items:center;gap:.375rem;margin-right:.75rem}
.nav-btn{padding:.4rem .75rem;border-radius:6px;border:none;background:none;color:var(--muted);font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:.3rem;white-space:nowrap;transition:.15s}
.nav-btn:hover{background:var(--surface);color:var(--text)}
.nav-btn.active{background:#eff6ff;color:var(--primary);font-weight:500}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);height:58px;z-index:100}
.bot-nav-inner{display:flex;height:100%}
.bot-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:.65rem;transition:.15s}
.bot-item i{font-size:1.2rem}
.bot-item.active{color:var(--primary)}
.bot-scan{background:var(--primary);border-radius:50%;width:50px;height:50px;margin-top:-14px;color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.4);flex:none}
.bot-scan i{font-size:1.4rem}
/* LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:1.25rem;padding-bottom:74px}
.page{display:none}
.page.active{display:block}
/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-pad{padding:1.25rem}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
.stat{border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
.stat-val{font-size:1.75rem;font-weight:700;color:var(--primary);line-height:1}
.stat-lbl{font-size:.75rem;color:var(--muted);margin-top:.25rem}
/* SEARCH */
.srch-wrap{position:relative;margin-bottom:1rem}
.srch-wrap i{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);color:var(--muted)}
.srch-input{width:100%;padding:.75rem .875rem .75rem 2.5rem;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;outline:none;background:#fff;transition:.15s}
.srch-input:focus{border-color:var(--primary)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--surface);padding:.65rem .875rem;text-align:left;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:.75rem .875rem;border-bottom:1px solid var(--border);font-size:.875rem}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--surface)}
/* BADGES */
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:1.75rem;padding:.2rem .5rem;border-radius:6px;font-weight:600;font-size:.8rem}
.b-ok{background:#dcfce7;color:#15803d}
.b-low{background:#fef9c3;color:#854d0e}
.b-zero{background:#fee2e2;color:#dc2626}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.375rem;padding:.6rem 1.1rem;border-radius:8px;border:none;font-size:.875rem;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-s{background:var(--success);color:#fff}.btn-s:hover{background:#15803d}
.btn-d{background:var(--danger);color:#fff}.btn-d:hover{background:#b91c1c}
.btn-o{background:#fff;color:var(--text);border:1.5px solid var(--border)}.btn-o:hover{background:var(--surface)}
.btn-w{background:#fff;color:var(--warn);border:1.5px solid var(--warn)}.btn-w:hover{background:#fffbeb}
.btn-sm{padding:.35rem .75rem;font-size:.8rem}
.btn-ico{width:30px;height:30px;border-radius:6px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:.9rem;transition:.15s}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.on{display:flex}
.mbox{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mhead{padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhead h5{font-size:1rem;font-weight:600}
.mbody{padding:1.25rem}
.mfoot{padding:.875rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.625rem;justify-content:flex-end}
.cls-btn{background:none;border:none;font-size:1.15rem;cursor:pointer;color:var(--muted);line-height:1}
/* FORM */
.fg{margin-bottom:.875rem}
.fl{display:block;font-size:.82rem;font-weight:500;margin-bottom:.3rem}
.fi{width:100%;padding:.575rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;background:#fff;color:var(--text);outline:none;transition:.15s}
.fi:focus{border-color:var(--primary)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}
/* IN/OUT SELECT */
.sel-item{border:1.5px solid var(--border);border-radius:10px;padding:.75rem;cursor:pointer;display:flex;align-items:center;gap:.625rem;transition:.15s}
.sel-item:hover{border-color:#93c5fd;background:#f0f9ff}
.sel-item.on{border-color:var(--primary);background:#eff6ff}
.chk{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.8rem}
.sel-item.on .chk{border-color:var(--primary);background:var(--primary);color:#fff}
/* ACTION BAR */
.act-bar{display:none;position:sticky;bottom:62px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:.875rem;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:50;margin-top:.5rem}
/* CAMERA */
.cam-wrap{position:relative;width:100%;max-width:440px;margin:0 auto;border-radius:12px;overflow:hidden;background:#000}
#scan-video{width:100%;display:block;max-height:60vh;object-fit:cover}
.scan-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{position:relative;width:200px;height:200px;border:3px solid rgba(37,99,235,.9);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.scan-line{position:absolute;left:0;right:0;height:2px;background:var(--primary);animation:scanMove 2s linear infinite}
@keyframes scanMove{0%{top:0}100%{top:100%}}
.scan-frame.ocr-mode{width:280px;height:160px}
/* LABEL */
.label-box{border:1.5px solid #000;width:320px;height:158px;display:flex;gap:6px;padding:6px;background:#fff;font-family:Arial,sans-serif;flex-shrink:0}
.label-qr{width:118px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.label-right{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.label-field{border:1px solid #000;padding:2px 4px}
.label-field-lbl{font-size:8px;color:#000}
.label-field-val{font-size:13px;font-weight:700;color:#000;word-break:break-all}
.label-seq{font-size:18px;font-weight:700;color:#000}
/* TX LIST */
.tx-row{display:flex;align-items:center;gap:.625rem;padding:.5rem 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.dot-in{background:#dcfce7;color:#15803d}
.dot-out{background:#fee2e2;color:#dc2626}
/* TOAST */
.toast-wrap{position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:.65rem 1rem;border-radius:8px;font-size:.85rem;display:flex;align-items:center;gap:.4rem;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:tIn .25s ease;max-width:280px}
.toast.t-ok{background:var(--success)}.toast.t-err{background:var(--danger)}.toast.t-info{background:var(--primary)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty i{font-size:2.5rem;display:block;margin-bottom:.75rem;opacity:.35}
/* OCR STATUS */
.ocr-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.625rem .875rem;font-size:.82rem;color:var(--muted);margin-top:.75rem;display:none}
.ocr-bar.on{display:flex;align-items:center;gap:.5rem}
/* RESPONSIVE */
@media(max-width:768px){
  .top-nav .nav-btn{display:none}
  .top-nav .brand span{display:none}
  .bot-nav{display:block}
  .wrap{padding:.875rem;padding-bottom:74px}
  .tbl th:nth-child(4),.tbl td:nth-child(4),.tbl th:nth-child(5),.tbl td:nth-child(5){display:none}
  .grid2{grid-template-columns:1fr}
  .label-grid{grid-template-columns:1fr!important}
}
@media(min-width:769px){.wrap{padding-bottom:1.25rem}}
@media print{
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{position:fixed;top:0;left:0}
}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.pg-title{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:.4rem;margin-bottom:1.1rem}
code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:.8rem}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast-wrap" id="toasts"></div>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="brand"><i class="bi bi-boxes"></i><span>部品在庫管理</span></div>
  <button class="nav-btn active" onclick="go('home')"><i class="bi bi-house"></i> ホーム</button>
  <button class="nav-btn" onclick="go('list')"><i class="bi bi-table"></i> 部品一覧</button>
  <button class="nav-btn" onclick="go('inout')"><i class="bi bi-arrow-left-right"></i> 入出庫</button>
  <button class="nav-btn" onclick="go('label')"><i class="bi bi-qr-code"></i> ラベル</button>
  <button class="nav-btn" onclick="go('scan')"><i class="bi bi-camera"></i> スキャン</button>
  <button class="nav-btn" onclick="go('backup')"><i class="bi bi-archive"></i> バックアップ</button>
</nav>

<!-- BOTTOM NAV -->
<nav class="bot-nav">
  <div class="bot-nav-inner">
    <button class="bot-item active" id="bn-home" onclick="go('home')"><i class="bi bi-house-fill"></i><span>ホーム</span></button>
    <button class="bot-item" id="bn-list" onclick="go('list')"><i class="bi bi-table"></i><span>一覧</span></button>
    <button class="bot-item bot-scan" id="bn-scan" onclick="go('scan')"><i class="bi bi-qr-code-scan"></i></button>
    <button class="bot-item" id="bn-inout" onclick="go('inout')"><i class="bi bi-arrow-left-right"></i><span>入出庫</span></button>
    <button class="bot-item" id="bn-more" onclick="toggleMore()"><i class="bi bi-three-dots"></i><span>その他</span></button>
  </div>
</nav>

<!-- MOBILE MORE MENU -->
<div id="more-menu" style="display:none;position:fixed;bottom:58px;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:99;padding:.875rem;box-shadow:0 -4px 20px rgba(0,0,0,.1)">
  <button class="btn btn-o" style="width:100%;margin-bottom:.5rem" onclick="go('label');toggleMore()"><i class="bi bi-qr-code"></i> ラベル作成</button>
  <button class="btn btn-o" style="width:100%" onclick="go('backup');toggleMore()"><i class="bi bi-archive"></i> バックアップ</button>
</div>

<div class="wrap">

<!-- ===== HOME ===== -->
<div class="page active" id="page-home">
  <div class="pg-title"><i class="bi bi-boxes" style="color:var(--primary)"></i> 在庫管理システム</div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">部品種類</div></div>
    <div class="stat"><div class="stat-val" id="s-qty">0</div><div class="stat-lbl">総在庫数</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--danger)" id="s-low">0</div><div class="stat-lbl">残少部品</div></div>
  </div>
  <div class="srch-wrap">
    <i class="bi bi-search"></i>
    <input class="srch-input" id="h-srch" placeholder="部品番号・部品名で検索..." oninput="hSearch(this.value)">
  </div>
  <div id="h-results"></div>
  <div class="card card-pad">
    <div class="sec-hdr">
      <span style="font-weight:600;font-size:.9rem">最近の入出庫</span>
      <button class="btn btn-p btn-sm" onclick="go('inout')"><i class="bi bi-plus"></i> 入出庫処理</button>
    </div>
    <div id="h-tx"><div class="empty"><i class="bi bi-inbox"></i>履歴がありません</div></div>
  </div>
</div>

<!-- ===== LIST ===== -->
<div class="page" id="page-list">
  <div class="sec-hdr">
    <div class="pg-title" style="margin:0"><i class="bi bi-table" style="color:var(--primary)"></i> 部品一覧</div>
    <button class="btn btn-p" onclick="openAdd()"><i class="bi bi-plus-lg"></i> 新規登録</button>
  </div>
  <div class="srch-wrap">
    <i class="bi bi-funnel"></i>
    <input class="srch-input" id="l-srch" placeholder="絞り込み検索..." oninput="renderList(this.value)">
  </div>
  <div class="card" style="overflow:hidden">
    <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr>
          <th>部品番号</th><th>部品名</th><th>数量</th><th>保管場所</th><th>特記事項</th><th style="width:96px">操作</th>
        </tr></thead>
        <tbody id="l-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== IN/OUT ===== -->
<div class="page" id="page-inout">
  <div class="pg-title"><i class="bi bi-arrow-left-right" style="color:var(--primary)"></i> 入出庫処理</div>
  <div style="display:flex;gap:.625rem;margin-bottom:1rem">
    <button class="btn btn-p" id="io-in" onclick="setType('in')" style="flex:1"><i class="bi bi-box-arrow-in-down"></i> 入庫</button>
    <button class="btn btn-o" id="io-out" onclick="setType('out')" style="flex:1"><i class="bi bi-box-arrow-up"></i> 出庫</button>
  </div>
  <p style="font-size:.82rem;color:var(--muted);margin-bottom:.625rem" id="io-hint">入庫する部品を選択（複数可）</p>
  <div id="io-list" style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:.5rem"></div>
  <div class="act-bar" id="act-bar">
    <div style="font-size:.8rem;color:var(--muted);margin-bottom:.625rem" id="sel-cnt">0件選択中</div>
    <div style="display:flex;gap:.625rem;align-items:center">
      <label style="font-size:.82rem;white-space:nowrap">数量:</label>
      <input type="number" id="io-qty" value="1" min="1" class="fi" style="width:70px;padding:.4rem">
      <button class="btn btn-s" onclick="execIO()" style="flex:1" id="io-exec"><i class="bi bi-check-lg"></i> 実行</button>
    </div>
  </div>
  <div class="card card-pad" style="margin-top:1rem">
    <h6 style="font-weight:600;margin-bottom:.875rem;font-size:.9rem">入出庫履歴</h6>
    <div id="io-hist"></div>
  </div>
</div>

<!-- ===== LABEL ===== -->
<div class="page" id="page-label">
  <div class="pg-title"><i class="bi bi-qr-code" style="color:var(--primary)"></i> ラベル作成</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.1rem" class="label-grid">
    <div class="card card-pad">
      <h6 style="font-weight:600;margin-bottom:.875rem;font-size:.9rem">部品選択・入力</h6>
      <div class="fg">
        <label class="fl">登録済み部品から選択</label>
        <select class="fi" id="lb-sel" onchange="lbFromSel()">
          <option value="">-- 選択 --</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">部品番号</label>
        <input class="fi" id="lb-no" placeholder="例: 1234567" oninput="lbUpdate()">
      </div>
      <div class="fg">
        <label class="fl">部品名</label>
        <input class="fi" id="lb-name" placeholder="例: HDD, 1TB" oninput="lbUpdate()">
      </div>
      <div class="fg">
        <label class="fl">印刷枚数</label>
        <input type="number" class="fi" id="lb-cnt" value="1" min="1" max="100">
      </div>
      <button class="btn btn-p" style="width:100%" onclick="printLabels()"><i class="bi bi-printer"></i> 印刷</button>
    </div>
    <div class="card card-pad">
      <h6 style="font-weight:600;margin-bottom:.875rem;font-size:.9rem">プレビュー</h6>
      <div id="lb-prev" style="display:flex;justify-content:center;align-items:center;min-height:160px">
        <div class="empty"><i class="bi bi-qr-code"></i>部品を選択してください</div>
      </div>
    </div>
  </div>
</div>

<!-- ===== SCAN ===== -->
<div class="page" id="page-scan">
  <div class="pg-title"><i class="bi bi-camera" style="color:var(--primary)"></i> QRコードスキャン</div>
  <div style="max-width:440px;margin:0 auto">
    <div style="display:flex;gap:.5rem;margin-bottom:.875rem">
      <button class="btn btn-p" id="sm-qr" onclick="setScanMode('qr')" style="flex:1"><i class="bi bi-qr-code-scan"></i> QRスキャン</button>
      <button class="btn btn-o" id="sm-ocr" onclick="setScanMode('ocr')" style="flex:1"><i class="bi bi-file-text"></i> OCR読取</button>
    </div>
    <div class="cam-wrap" id="cam-wrap">
      <video id="scan-video" autoplay playsinline muted></video>
      <div class="scan-ov">
        <div class="scan-frame" id="sf"><div class="scan-line"></div></div>
      </div>
    </div>
    <canvas id="scan-cv" style="display:none"></canvas>
    <div id="ocr-cap" style="display:none;margin-top:.75rem">
      <button class="btn btn-p" style="width:100%" onclick="doOCR()"><i class="bi bi-camera"></i> 撮影してOCR読取</button>
    </div>
    <div class="ocr-bar" id="ocr-bar"><i class="bi bi-hourglass-split"></i><span id="ocr-msg">OCR処理中...</span></div>
    <div style="display:flex;gap:.625rem;margin-top:.875rem">
      <button class="btn btn-s" id="cam-start" onclick="startCam()" style="flex:1"><i class="bi bi-camera-video"></i> カメラ起動</button>
      <button class="btn btn-d" id="cam-stop" onclick="stopCam()" style="flex:1;display:none"><i class="bi bi-camera-video-off"></i> 停止</button>
    </div>
    <div id="scan-res" style="display:none;margin-top:1rem" class="card card-pad"></div>
  </div>
</div>

<!-- ===== BACKUP ===== -->
<div class="page" id="page-backup">
  <div class="pg-title"><i class="bi bi-archive" style="color:var(--primary)"></i> バックアップ</div>
  <div style="display:grid;gap:.875rem;max-width:560px">
    <div class="card card-pad">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem">
        <div style="width:38px;height:38px;background:#eff6ff;border-radius:9px;display:flex;align-items:center;justify-content:center"><i class="bi bi-download" style="color:var(--primary);font-size:1.1rem"></i></div>
        <div><div style="font-weight:600;font-size:.9rem">データをエクスポート</div><div style="font-size:.78rem;color:var(--muted)">JSONファイルとして保存</div></div>
      </div>
      <button class="btn btn-p" style="width:100%" onclick="exportData()"><i class="bi bi-download"></i> エクスポート</button>
    </div>
    <div class="card card-pad">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem">
        <div style="width:38px;height:38px;background:#f0fdf4;border-radius:9px;display:flex;align-items:center;justify-content:center"><i class="bi bi-upload" style="color:var(--success);font-size:1.1rem"></i></div>
        <div><div style="font-weight:600;font-size:.9rem">データをインポート</div><div style="font-size:.78rem;color:var(--muted)">JSONファイルから復元</div></div>
      </div>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-s" style="width:100%" onclick="document.getElementById('imp-file').click()"><i class="bi bi-upload"></i> インポート</button>
    </div>
    <div class="card card-pad">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem">
        <div style="width:38px;height:38px;background:#fef2f2;border-radius:9px;display:flex;align-items:center;justify-content:center"><i class="bi bi-trash" style="color:var(--danger);font-size:1.1rem"></i></div>
        <div><div style="font-weight:600;font-size:.9rem">全データリセット</div><div style="font-size:.78rem;color:var(--muted)">全データを削除します</div></div>
      </div>
      <button class="btn btn-d" style="width:100%" onclick="resetData()"><i class="bi bi-exclamation-triangle"></i> リセット</button>
    </div>
    <div class="card card-pad" id="bk-summary"></div>
  </div>
</div>

      <div class="grid2">
        <div class="fg"><label class="fl">数量</label><input type="number" class="fi" id="f-qty" value="0" min="0"></div>
        <div class="fg"><label class="fl">保管場所</label><input class="fi" id="f-loc" placeholder="例: 棚A-1"></div>
      </div>
      <div class="fg"><label class="fl">特記事項</label><textarea class="fi" id="f-note" rows="2" placeholder="メモ・特記事項"></textarea></div>
    </div>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeM('m-part')">キャンセル</button>

<div class="overlay" id="m-found">

    <div class="mbody" id="m-found-body"></div>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeM('m-found')">閉じる</button>
      <button class="btn btn-d" id="quick-out" onclick="quickOut()"><i class="bi bi-box-arrow-up"></i> 出庫 (-1)</button>

<!-- PRINT AREA -->
<div id="print-area" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ========== DB ==========
const SK = 'inv_v1';
let db = { parts:[], txs:[], seq:0 };

function load(){ try{ const s=localStorage.getItem(SK); if(s) db=JSON.parse(s); }catch(e){} }
function save(){ try{ localStorage.setItem(SK,JSON.stringify(db)); }catch(e){ toast('保存エラー','err'); } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function nseq(){ db.seq=(db.seq||0)+1; return String(db.seq).padStart(5,'0'); }

function addPart(d){
  const p={id:uid(),seq:nseq(),partNo:d.partNo,partName:d.partName,
    qty:parseInt(d.qty)||0,loc:d.loc||'',note:d.note||'',
    createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  db.parts.push(p); save(); return p;
}
function updPart(id,d){
  const i=db.parts.findIndex(p=>p.id===id); if(i<0) return null;
  db.parts[i]={...db.parts[i],...d,updatedAt:new Date().toISOString()}; save(); return db.parts[i];
}
function delPart(id){ db.parts=db.parts.filter(p=>p.id!==id); db.txs=db.txs.filter(t=>t.pid!==id); save(); }
function getPart(id){ return db.parts.find(p=>p.id===id); }
function getPartByNo(no){ return db.parts.find(p=>p.partNo===no); }

function addTx(pid,type,qty,note=''){
  const p=getPart(pid); if(!p) return;
  const after=type==='in'?p.qty+qty:Math.max(0,p.qty-qty);
  const tx={id:uid(),pid,partNo:p.partNo,partName:p.partName,
    type,qty,before:p.qty,after,note,date:new Date().toISOString()};
  updPart(pid,{qty:after});
  db.txs.unshift(tx);
  if(db.txs.length>500) db.txs=db.txs.slice(0,500);
  save(); return tx;
}

// ========== NAV ==========
let cur='home';
let camStream=null, scanRaf=null, scanMode='qr', scanCooldown=false;

function go(p){
  if(cur==='scan'&&p!=='scan') stopCam();
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  // desktop nav
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nav=['home','list','inout','label','scan','backup'];
  const di=nav.indexOf(p); if(di>=0) document.querySelectorAll('.nav-btn')[di].classList.add('active');
  // bot nav
  ['home','list','scan','inout'].forEach(n=>{
    const el=document.getElementById('bn-'+n);
    if(el) el.classList.toggle('active',n===p);
  });
  cur=p;
  if(p==='home') renderHome();
  if(p==='list') renderList();
  if(p==='inout') renderInOut();
  if(p==='label') renderLabel();
  if(p==='scan') initScan();
  if(p==='backup') renderBackup();
  document.getElementById('more-menu').style.display='none';
}

function toggleMore(){ const m=document.getElementById('more-menu'); m.style.display=m.style.display==='none'?'block':'none'; }

// ========== HOME ==========
function renderHome(){
  document.getElementById('s-total').textContent=db.parts.length;
  document.getElementById('s-qty').textContent=db.parts.reduce((s,p)=>s+p.qty,0);
  document.getElementById('s-low').textContent=db.parts.filter(p=>p.qty<=3).length;
  const el=document.getElementById('h-tx');
  if(!db.txs.length){el.innerHTML='<div class="empty"><i class="bi bi-inbox"></i>履歴がありません</div>';return;}
  el.innerHTML=db.txs.slice(0,10).map(t=>`
    <div class="tx-row">
      <div class="tx-dot ${t.type==='in'?'dot-in':'dot-out'}"><i class="bi bi-arrow-${t.type==='in'?'down':'up'}"></i></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.875rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.partName)}</div>
        <div style="font-size:.73rem;color:var(--muted)">${esc(t.partNo)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span style="font-weight:600;color:${t.type==='in'?'var(--success)':'var(--danger)'}">${t.type==='in'?'+':'-'}${t.qty}</span>
        <div style="font-size:.7rem;color:var(--muted)">${fmtDate(t.date)}</div>
      </div>
    </div>`).join('');
}

function hSearch(q){
  const el=document.getElementById('h-results');
  if(!q.trim()){el.innerHTML='';return;}
  const r=db.parts.filter(p=>p.partNo.toLowerCase().includes(q.toLowerCase())||p.partName.toLowerCase().includes(q.toLowerCase()));
  if(!r.length){el.innerHTML='<p style="font-size:.85rem;color:var(--muted);padding:.5rem 0">検索結果なし</p>';return;}
  el.innerHTML=`<div class="card" style="overflow:hidden;margin-bottom:1rem"><div style="overflow-x:auto">
    <table class="tbl"><thead><tr><th>部品番号</th><th>部品名</th><th>数量</th><th>保管場所</th></tr></thead>
    <tbody>${r.map(p=>`<tr onclick="openEdit('${p.id}')" style="cursor:pointer">
      <td><code>${esc(p.partNo)}</code></td><td style="font-weight:500">${esc(p.partName)}</td>
      <td>${badge(p.qty)}</td><td style="color:var(--muted)">${esc(p.loc)}</td>
    </tr>`).join('')}</tbody></table></div></div>`;
}

// ========== LIST ==========
function renderList(q=''){
  const tbody=document.getElementById('l-tbody');
  let parts=db.parts;
  if(q){ const lq=q.toLowerCase(); parts=parts.filter(p=>p.partNo.toLowerCase().includes(lq)||p.partName.toLowerCase().includes(lq)||p.loc.toLowerCase().includes(lq)); }
  if(!parts.length){
    tbody.innerHTML=`<tr><td colspan="6"><div class="empty"><i class="bi bi-inbox"></i>${q?'検索結果がありません':'部品が登録されていません'}</div></td></tr>`;
    return;
  }
  tbody.innerHTML=parts.map(p=>`
    <tr>
      <td><code>${esc(p.partNo)}</code></td>
      <td style="font-weight:500">${esc(p.partName)}</td>
      <td>${badge(p.qty)}</td>
      <td style="color:var(--muted)">${esc(p.loc)}</td>
      <td style="color:var(--muted);font-size:.8rem;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.note)}</td>
      <td>
        <div style="display:flex;gap:3px">
          <button class="btn-ico" style="background:#eff6ff;color:var(--primary)" onclick="openEdit('${p.id}')" title="編集"><i class="bi bi-pencil"></i></button>
          <button class="btn-ico" style="background:#f0fdf4;color:var(--success)" onclick="goLabel('${p.id}')" title="ラベル"><i class="bi bi-qr-code"></i></button>
          <button class="btn-ico" style="background:#fef2f2;color:var(--danger)" onclick="confirmDel('${p.id}')" title="削除"><i class="bi bi-trash"></i></button>
        </div>
      </td>
    </tr>`).join('');
}

// ========== IN/OUT ==========
let sel=new Set(), ioType='in';

function setType(t){
  ioType=t;
  document.getElementById('io-in').className='btn '+(t==='in'?'btn-p':'btn-o');
  document.getElementById('io-out').className='btn '+(t==='out'?'btn-d':'btn-o');
  document.getElementById('io-hint').textContent=t==='in'?'入庫する部品を選択（複数可）':'出庫する部品を選択（複数可）';
  document.getElementById('io-exec').innerHTML=`<i class="bi bi-check-lg"></i> ${t==='in'?'入庫':'出庫'}実行`;
  sel.clear(); renderIOList();
}

function renderInOut(){ sel.clear(); renderIOList(); renderHist(); setType(ioType); }

function renderIOList(){
  const el=document.getElementById('io-list');
  if(!db.parts.length){el.innerHTML='<div class="empty"><i class="bi bi-inbox"></i>部品が登録されていません</div>';document.getElementById('act-bar').style.display='none';return;}
  el.innerHTML=db.parts.map(p=>{
    const on=sel.has(p.id);
    return `<div class="sel-item ${on?'on':''}" onclick="toggleSel('${p.id}')">
      <div class="chk">${on?'<i class="bi bi-check-lg"></i>':''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:500;font-size:.875rem">${esc(p.partName)}</div>
        <div style="font-size:.73rem;color:var(--muted)">${esc(p.partNo)}${p.loc?' | '+esc(p.loc):''}</div>
      </div>
      <div>${badge(p.qty)}</div>
    </div>`;
  }).join('');
  const bar=document.getElementById('act-bar');
  if(sel.size>0){bar.style.display='block';document.getElementById('sel-cnt').textContent=`${sel.size}件選択中`;}
  else bar.style.display='none';
}

function toggleSel(id){ if(sel.has(id)) sel.delete(id); else sel.add(id); renderIOList(); }

function execIO(){
  if(!sel.size) return;
  const qty=parseInt(document.getElementById('io-qty').value)||1;
  sel.forEach(id=>addTx(id,ioType,qty));
  toast(`${sel.size}件の${ioType==='in'?'入庫':'出庫'}処理が完了しました`,'ok');
  sel.clear(); renderIOList(); renderHist(); renderHome();
}

function renderHist(){
  const el=document.getElementById('io-hist');
  if(!db.txs.length){el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:.82rem;padding:1rem">履歴なし</div>';return;}
  el.innerHTML=db.txs.slice(0,20).map(t=>`
    <div class="tx-row">
      <div class="tx-dot ${t.type==='in'?'dot-in':'dot-out'}"><i class="bi bi-arrow-${t.type==='in'?'down':'up'}"></i></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.85rem;font-weight:500">${esc(t.partName)}</div>
        <div style="font-size:.73rem;color:var(--muted)">${esc(t.partNo)} | ${t.before}→${t.after}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span style="font-weight:600;font-size:.875rem;color:${t.type==='in'?'var(--success)':'var(--danger)'}">${t.type==='in'?'+':'-'}${t.qty}</span>
        <div style="font-size:.7rem;color:var(--muted)">${fmtDate(t.date)}</div>
      </div>
    </div>`).join('');
}

// ========== LABEL ==========
function renderLabel(){
  const sel=document.getElementById('lb-sel');
  sel.innerHTML='<option value="">-- 選択 --</option>'+db.parts.map(p=>`<option value="${p.id}">${esc(p.partNo)} - ${esc(p.partName)}</option>`).join('');
}

function lbFromSel(){
  const id=document.getElementById('lb-sel').value; if(!id) return;
  const p=getPart(id); if(!p) return;
  document.getElementById('lb-no').value=p.partNo;
  document.getElementById('lb-name').value=p.partName;
  lbUpdate();
}

function lbUpdate(){
  const no=document.getElementById('lb-no').value;
  const name=document.getElementById('lb-name').value;
  const el=document.getElementById('lb-prev');
  if(!no&&!name){el.innerHTML='<div class="empty"><i class="bi bi-qr-code"></i>入力してください</div>';return;}
  const p=getPartByNo(no);
  const seq=p?(p.seq||'00001'):'00001';
  buildLabelPreview(el,'lb-prev-qr',no,name,seq);
}

function buildLabelPreview(container, qrId, no, name, seq){
  container.innerHTML=`<div class="label-box">
    <div class="label-qr" id="${qrId}"></div>
    <div class="label-right">
      <div class="label-field"><div class="label-field-lbl">Part No.</div><div class="label-field-val">${esc(no)}</div></div>
      <div class="label-field"><div class="label-field-lbl">Part Name</div><div class="label-field-val">${esc(name)}</div></div>
      <div class="label-seq">${esc(seq)}</div>
    </div>
  </div>`;
  QRCode.toCanvas(document.createElement('canvas'),JSON.stringify({partNo:no,partName:name}),{width:110,margin:1},(err,cv)=>{
    if(!err){cv.style.cssText='width:110px;height:110px';const qrEl=document.getElementById(qrId);if(qrEl)qrEl.appendChild(cv);}
  });
}

function goLabel(id){
  go('label');
  setTimeout(()=>{ document.getElementById('lb-sel').value=id; lbFromSel(); },80);
}

async function printLabels(){
  const no=document.getElementById('lb-no').value.trim();
  const name=document.getElementById('lb-name').value.trim();
  const cnt=parseInt(document.getElementById('lb-cnt').value)||1;
  if(!no||!name){toast('部品番号と部品名を入力してください','err');return;}
  const p=getPartByNo(no); const seq=p?(p.seq||'00001'):'00001';
  const qrData=JSON.stringify({partNo:no,partName:name});
  const pa=document.getElementById('print-area');
  pa.style.display='block'; pa.innerHTML='';
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-wrap:wrap;gap:8px;padding:8px';
  for(let i=0;i<cnt;i++){
    const lb=document.createElement('div'); lb.className='label-box';
    const qd=document.createElement('div'); qd.className='label-qr'; qd.id='pqr'+i;
    const ri=document.createElement('div'); ri.className='label-right';
    ri.innerHTML=`<div class="label-field"><div class="label-field-lbl">Part No.</div><div class="label-field-val">${esc(no)}</div></div>
      <div class="label-field"><div class="label-field-lbl">Part Name</div><div class="label-field-val">${esc(name)}</div></div>
      <div class="label-seq">${esc(seq)}</div>`;
    lb.appendChild(qd); lb.appendChild(ri); wrap.appendChild(lb);
  }
  pa.appendChild(wrap);
  await Promise.all(Array.from({length:cnt},(_,i)=>new Promise(res=>{
    QRCode.toCanvas(document.createElement('canvas'),qrData,{width:110,margin:1},(err,cv)=>{
      if(!err){cv.style.cssText='width:110px;height:110px';const el=document.getElementById('pqr'+i);if(el)el.appendChild(cv);}
      res();
    });
  })));
  window.print();
  setTimeout(()=>{pa.style.display='none';},1000);
}

// ========== SCAN ==========
function initScan(){
  if(window.innerWidth<768) startCam();
}

function setScanMode(m){
  scanMode=m;
  document.getElementById('sm-qr').className='btn '+(m==='qr'?'btn-p':'btn-o');
  document.getElementById('sm-ocr').className='btn '+(m==='ocr'?'btn-p':'btn-o');
  document.getElementById('ocr-cap').style.display=m==='ocr'?'block':'none';
  document.getElementById('scan-res').style.display='none';
  const sf=document.getElementById('sf');
  sf.className='scan-frame'+(m==='ocr'?' ocr-mode':'');
  if(m==='qr'&&camStream) startQRLoop();
}

async function startCam(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    const v=document.getElementById('scan-video'); v.srcObject=camStream;
    document.getElementById('cam-start').style.display='none';
    document.getElementById('cam-stop').style.display='flex';
    v.onloadedmetadata=()=>{ if(scanMode==='qr') startQRLoop(); };
  }catch(e){ toast('カメラアクセスエラー: '+e.message,'err'); }
}

function stopCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  if(scanRaf){cancelAnimationFrame(scanRaf);scanRaf=null;}
  const v=document.getElementById('scan-video'); if(v) v.srcObject=null;
  const cs=document.getElementById('cam-start'); if(cs) cs.style.display='flex';
  const cp=document.getElementById('cam-stop'); if(cp) cp.style.display='none';
}

function startQRLoop(){
  if(scanRaf){cancelAnimationFrame(scanRaf);scanRaf=null;}
  const v=document.getElementById('scan-video');
  const cv=document.getElementById('scan-cv');
  const ctx=cv.getContext('2d');
  function tick(){
    if(!camStream||scanMode!=='qr'){scanRaf=null;return;}
    if(v.readyState===v.HAVE_ENOUGH_DATA){
      cv.width=v.videoWidth; cv.height=v.videoHeight;
      ctx.drawImage(v,0,0);
      const d=ctx.getImageData(0,0,cv.width,cv.height);
      const r=jsQR(d.data,d.width,d.height,{inversionAttempts:'dontInvert'});
      if(r&&!scanCooldown){handleQR(r.data);return;}
    }
    scanRaf=requestAnimationFrame(tick);
  }
  scanRaf=requestAnimationFrame(tick);
}

function handleQR(data){
  scanCooldown=true; setTimeout(()=>{scanCooldown=false;if(camStream&&scanMode==='qr')startQRLoop();},3000);
  let no='',name='';
  try{const j=JSON.parse(data);no=j.partNo||'';name=j.partName||'';}catch{no=data;}
  const p=getPartByNo(no);
  if(p) showFoundModal(p);
  else openAddFromScan(no,name);
}

function showFoundModal(p){
  document.getElementById('m-found-body').innerHTML=`
    <div style="display:grid;gap:.625rem">
      ${infoRow('部品番号',`<code>${esc(p.partNo)}</code>`)}
      ${infoRow('部品名',`<span style="font-weight:500">${esc(p.partName)}</span>`)}
      ${infoRow('現在数量',badge(p.qty))}
      ${infoRow('保管場所',esc(p.loc)||'—')}
      ${p.note?infoRow('特記事項',esc(p.note)):''}
    </div>`;
  document.getElementById('quick-out').dataset.pid=p.id;
  openM('m-found');
}
function infoRow(lbl,val){return `<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem .75rem;background:var(--surface);border-radius:8px"><span style="font-size:.78rem;color:var(--muted)">${lbl}</span><span>${val}</span></div>`;}

function quickOut(){
  const pid=document.getElementById('quick-out').dataset.pid;
  addTx(pid,'out',1); closeM('m-found'); toast('出庫処理が完了しました','ok'); renderHome();
}

function openAddFromScan(no,name){
  openAdd();
  if(no) document.getElementById('f-no').value=no;
  if(name) document.getElementById('f-name').value=name;
  toast('未登録の部品です。情報を入力して登録してください','info');
}

async function doOCR(){
  const v=document.getElementById('scan-video');
  const cv=document.getElementById('scan-cv');
  const ctx=cv.getContext('2d');
  cv.width=v.videoWidth; cv.height=v.videoHeight;
  ctx.drawImage(v,0,0);
  const ob=document.getElementById('ocr-bar'); ob.classList.add('on');
  const om=document.getElementById('ocr-msg');
  try{
    const {data:{text}}=await Tesseract.recognize(cv,'jpn+eng',{
      logger:m=>{if(m.status==='recognizing text') om.textContent=`OCR処理中... ${Math.round(m.progress*100)}%`;}
    });
    ob.innerHTML='<i class="bi bi-check-circle" style="color:var(--success)"></i><span>OCR完了</span>';
    const no=extractNo(text), name=extractName(text);
    if(no||name){toast('OCR読取完了','ok'); openAddFromScan(no,name);}
    else toast('テキストを認識できませんでした','err');
    setTimeout(()=>{ob.classList.remove('on');ob.innerHTML='<i class="bi bi-hourglass-split"></i><span id="ocr-msg">OCR処理中...</span>';},4000);
  }catch(e){ob.classList.remove('on');toast('OCRエラー: '+e.message,'err');}
}

function extractNo(t){
  const r=[/Part\s*No\.?\s*[:\s]*([A-Za-z0-9\-_]+)/i,/部品番号\s*[:\s]*([A-Za-z0-9\-_]+)/i,/\b([0-9]{5,10})\b/];
  for(const p of r){const m=t.match(p);if(m) return m[1].trim();}
  return '';
}
function extractName(t){
  const r=[/Part\s*Name\s*[:\s]*([^\n\r]+)/i,/部品名\s*[:\s]*([^\n\r]+)/i];
  for(const p of r){const m=t.match(p);if(m) return m[1].trim();}
  return '';
}

// ========== MODAL ==========
function openAdd(){
  document.getElementById('m-title').textContent='部品登録';
  document.getElementById('f-id').value='';
  ['f-no','f-name','f-loc','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-qty').value='0';
  openM('m-part');
}
function openEdit(id){
  const p=getPart(id); if(!p) return;
  document.getElementById('m-title').textContent='部品編集';
  document.getElementById('f-id').value=id;
  document.getElementById('f-no').value=p.partNo;
  document.getElementById('f-name').value=p.partName;
  document.getElementById('f-qty').value=p.qty;
  document.getElementById('f-loc').value=p.loc;
  document.getElementById('f-note').value=p.note;
  openM('m-part');
}
function savePart(){
  const no=document.getElementById('f-no').value.trim();
  const name=document.getElementById('f-name').value.trim();
  if(!no||!name){toast('部品番号と部品名は必須です','err');return;}
  const data={partNo:no,partName:name,qty:parseInt(document.getElementById('f-qty').value)||0,
    loc:document.getElementById('f-loc').value.trim(),note:document.getElementById('f-note').value.trim()};
  const id=document.getElementById('f-id').value;
  if(id){
    const old=getPart(id);
    if(old&&old.qty!==data.qty){const d=data.qty-old.qty; d>0?addTx(id,'in',d,'手動更新'):addTx(id,'out',-d,'手動更新');}
    updPart(id,data); toast('更新しました','ok');
  } else {
    const np=addPart(data);
    if(data.qty>0) addTx(np.id,'in',data.qty,'初期登録');
    toast('登録しました','ok');
  }
  closeM('m-part'); renderList(document.getElementById('l-srch').value); renderHome();
}

function confirmDel(id){
  const p=getPart(id); if(!p) return;
  document.getElementById('cf-title').textContent='削除の確認';
  document.getElementById('cf-msg').textContent=`「${p.partName}」を削除しますか？この操作は元に戻せません。`;
  document.getElementById('cf-ok').onclick=()=>{
    delPart(id); closeM('m-confirm'); toast('削除しました','ok');
    renderList(document.getElementById('l-srch').value); renderHome();
  };
  openM('m-confirm');
}

function openM(id){ document.getElementById(id).classList.add('on'); }
function closeM(id){
  document.getElementById(id).classList.remove('on');
  if(cur==='scan'&&camStream&&scanMode==='qr') setTimeout(startQRLoop,400);
}

document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{
  if(e.target===o){o.classList.remove('on'); if(cur==='scan'&&camStream&&scanMode==='qr') setTimeout(startQRLoop,400);}
}));

// ========== BACKUP ==========
function exportData(){
  const b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`parts_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.json`; a.click();
  URL.revokeObjectURL(a.href); toast('エクスポートしました','ok');
}
function importData(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.parts||!Array.isArray(d.parts)) throw new Error('無効なファイル形式');
      db=d; save(); toast(`インポートしました（${db.parts.length}件）`,'ok');
      renderHome(); renderBackup();
    }catch(err){toast('インポートエラー: '+err.message,'err');}
  };
  r.readAsText(f); e.target.value='';
}
function resetData(){
  document.getElementById('cf-title').textContent='データリセット';
  document.getElementById('cf-msg').textContent='全データを削除します。この操作は元に戻せません。本当によろしいですか？';
  document.getElementById('cf-ok').onclick=()=>{
    db={parts:[],txs:[],seq:0}; save(); closeM('m-confirm'); toast('リセットしました','ok');
    renderHome(); renderBackup();
  };
  openM('m-confirm');
}
function renderBackup(){
  document.getElementById('bk-summary').innerHTML=`<h6 style="font-weight:600;margin-bottom:.875rem;font-size:.9rem">データ概要</h6>
    <div style="display:grid;gap:0">
      ${bkRow('登録部品数',db.parts.length+'種類')}
      ${bkRow('総在庫数',db.parts.reduce((s,p)=>s+p.qty,0)+'点')}
      ${bkRow('入出庫履歴数',db.txs.length+'件')}
      ${bkRow('最終更新',db.txs.length?fmtDate(db.txs[0].date):'なし')}
    </div>`;
}
function bkRow(l,v){return `<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border)"><span style="font-size:.875rem;color:var(--muted)">${l}</span><span style="font-weight:600;font-size:.875rem">${v}</span></div>`;}

// ========== UTILS ==========
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function badge(q){ const c=q===0?'b-zero':q<=3?'b-low':'b-ok'; return `<span class="badge ${c}">${q}</span>`; }
function fmtDate(iso){
  const d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<60000) return 'たった今';
  if(diff<3600000) return Math.floor(diff/60000)+'分前';
  if(diff<86400000) return Math.floor(diff/3600000)+'時間前';
  return d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function toast(msg,type='info'){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  const ic=type==='ok'?'check-circle':type==='err'?'exclamation-circle':'info-circle';
  t.className=`toast t-${type==='ok'?'ok':type==='err'?'err':'info'}`;
  t.innerHTML=`<i class="bi bi-${ic}"></i> ${esc(msg)}`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='tIn .25s ease reverse';setTimeout(()=>t.remove(),250);},3000);
}

// ========== INIT ==========
load(); renderHome();
</script>
